services:
  - type: web
    name: tracking-tasks
    runtime: node
    plan: free
    buildCommand: npm install && npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: MANAGER_EMAIL
        sync: false
      - key: MANAGER_PASSWORD
        sync: false
      - key: IP_HASH_SALT
        generateValue: true
